name: Production Deployment

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          # API 토큰이 다중 계정에 연결돼 있어 비대화형에서 계정 선택 불가 → 명시 필요
          CLOUDFLARE_ACCOUNT_ID: bbff6e9bc7c37ea1aa3b7a1de23895a9
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name the-meti --branch main
