name: Preview Deployment + E2E Test

on:
  push:
    branches: ['feature/**']

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # API 토큰이 다중 계정에 연결돼 있어 비대화형에서 계정 선택 불가 → 명시 필요
          accountId: bbff6e9bc7c37ea1aa3b7a1de23895a9
          command: pages deploy dist --project-name the-meti --branch ${{ github.ref_name }}

      - name: Extract Preview URL
        id: preview-url
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          PREVIEW_URL="https://${BRANCH}.the-meti.pages.dev"
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Wait for Preview to be ready
        run: sleep 15

      - name: Run Playwright Tests
        run: npx playwright test --timeout=60000
        env:
          BASE_URL: ${{ steps.preview-url.outputs.url }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          CI: true
        continue-on-error: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.ref_name }}
          path: playwright-report/
          retention-days: 7

      - name: Summary
        run: |
          echo "## Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview URL**: ${{ steps.preview-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
